name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/api-zod/**'
      - 'lib/db/**'
      - 'lib/api-spec/**'
      - 'scripts/ensure-pnpm.mjs'
      - 'scripts/package.json'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
      - '.dockerignore'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: binance-loan-tracker-backend
  NODE_VERSION: '24.x'

jobs:
  # ---------------------------------------------------------------------------
  # Docker build guard
  # ---------------------------------------------------------------------------
  # The production deploy below ships an esbuild-bundled zip, but the api-server
  # Dockerfile is also a fully supported deployment path (web app for
  # containers, ACR, local docker run, future ACA migration). This job exists
  # so the Dockerfile is exercised on every push: if anyone refactors the
  # monorepo manifest layout, pnpm overrides, or root scripts in a way that
  # breaks the multi-stage build, the workflow fails here BEFORE we have a
  # chance to lose that work to bit-rot.
  # ---------------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/api-server/Dockerfile
          push: false
          load: true
          tags: binance-loan-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          set -euo pipefail
          docker run -d --name smoke -p 18080:8080 \
            -e PORT=8080 \
            -e CLERK_SECRET_KEY=sk_test_dummy_smoke \
            binance-loan-backend:ci
          for i in $(seq 1 15); do
            if curl -sSf --max-time 5 http://localhost:18080/api/healthz > /tmp/healthz.json; then
              echo "OK on attempt $i: $(cat /tmp/healthz.json)"
              docker rm -f smoke > /dev/null
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to serve healthz. Logs:"
          docker logs smoke
          docker rm -f smoke > /dev/null
          exit 1

  build-and-deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Build workspace lib type declarations first — api-server's typecheck
      # imports types from @workspace/api-zod and @workspace/db, which live
      # behind `tsc --build` project references.
      - name: Build workspace type declarations
        run: pnpm run typecheck:libs

      - name: Typecheck backend
        run: pnpm --filter @workspace/api-server run typecheck

      - name: Build backend
        run: pnpm --filter @workspace/api-server run build

      - name: Stage deploy package
        run: |
          mkdir -p deploy
          cp -r artifacts/api-server/dist deploy/dist
          cat > deploy/package.json <<'EOF'
          {
            "name": "binance-loan-tracker-backend",
            "version": "0.0.0",
            "private": true,
            "type": "module",
            "scripts": {
              "start": "node --enable-source-maps ./dist/index.mjs"
            }
          }
          EOF
          ls -la deploy
          ls -la deploy/dist

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      - name: Smoke test
        run: |
          set -euo pipefail
          url="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/healthz"
          echo "Probing $url (up to 5 min)..."
          for i in $(seq 1 30); do
            if curl -sSf --max-time 15 "$url" > /tmp/healthz.json; then
              echo "OK after attempt $i:"
              cat /tmp/healthz.json
              exit 0
            fi
            echo "  attempt $i failed; sleeping 10s"
            sleep 10
          done
          echo "Healthz never recovered. Recent app logs:"
          exit 1
