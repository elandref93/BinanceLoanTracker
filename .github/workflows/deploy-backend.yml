name: Deploy Backend

# ---------------------------------------------------------------------------
# Deployment flow (Docker-only):
#
#   GitHub push to main
#     -> CI builds artifacts/api-server/Dockerfile (multi-stage, esbuild bundle)
#     -> CI runs the container locally and probes /api/healthz   (gate)
#     -> CI logs in to ACR with ACR_USERNAME / ACR_PASSWORD secrets
#     -> CI pushes the image as both :<commit-sha> and :latest
#     -> ACR webhook 'backendAutoDeploy' fires on the :latest push
#     -> Azure App Service pulls the new image and restarts the container
#     -> CI smoke-tests the live https endpoint
#
# Rollback: re-tag the desired SHA in ACR as :latest, e.g.
#   az acr import --name binancetrackeracr \
#       --source binancetrackeracr.azurecr.io/binance-loan-backend:<sha> \
#       --image binance-loan-backend:latest --force
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/api-zod/**'
      - 'lib/db/**'
      - 'lib/api-spec/**'
      - 'scripts/ensure-pnpm.mjs'
      - 'scripts/package.json'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
      - '.dockerignore'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: binance-loan-tracker-backend
  ACR_LOGIN_SERVER:  binancetrackeracr.azurecr.io
  IMAGE_NAME:        binance-loan-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build once (using GHA layer cache), keep it locally so we can smoke
      # test before pushing anything to ACR.
      - name: Build api-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/api-server/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pre-flight smoke test inside CI: if the image can't start a container
      # and serve /api/healthz on port 8080, we abort BEFORE publishing it to
      # ACR, so the production webapp never sees a broken :latest tag.
      - name: Container smoke test
        run: |
          set -euo pipefail
          docker run -d --name smoke -p 18080:8080 \
            -e PORT=8080 \
            -e APPLE_BUNDLE_ID=com.ubuntu.life.ledger \
            -e SESSION_JWT_SECRET=smoke_test_secret_at_least_32_bytes_xxxxxxx \
            ${{ env.IMAGE_NAME }}:ci
          for i in $(seq 1 15); do
            if curl -sSf --max-time 5 http://localhost:18080/api/healthz > /tmp/healthz.json; then
              echo "container healthy on attempt $i: $(cat /tmp/healthz.json)"
              docker rm -f smoke > /dev/null
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to serve /api/healthz. Logs:"
          docker logs smoke
          docker rm -f smoke > /dev/null
          exit 1

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Push both the immutable :<sha> (for rollback / audit) and :latest
      # (which fires the ACR -> App Service webhook configured in
      # scripts/wire-acr-webhook.ps1). Reuses the buildx cache from the
      # first build step, so this is just a layer push, not a rebuild.
      - name: Push image to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/api-server/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha

      # The ACR webhook tells App Service to pull. Give Azure a generous
      # window: image pull on a Basic plan can take ~1-3 minutes the first
      # time and the platform restarts the container on every settings touch.
      - name: Live health check
        run: |
          set -euo pipefail
          url="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/healthz"
          echo "Probing $url for up to 6 minutes ..."
          for i in $(seq 1 36); do
            if curl -sSf --max-time 10 "$url" > /tmp/healthz.json; then
              echo "live healthz OK on attempt $i: $(cat /tmp/healthz.json)"
              exit 0
            fi
            echo "  attempt $i failed; sleeping 10s"
            sleep 10
          done
          echo "Live healthz never recovered."
          exit 1
