openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: binance
    description: Binance loan tracker (read-only)
  - name: luno
    description: Luno wallet + transaction reads (read-only)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /accounts:
    get:
      operationId: listAccounts
      tags: [binance]
      summary: List connected Binance accounts
      responses:
        "200":
          description: Accounts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Account"
                required: [accounts]

  /loans:
    get:
      operationId: listLoans
      tags: [binance]
      summary: List open loans across all (or one) account
      parameters:
        - in: query
          name: accountId
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Loans list with aggregate metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoansResponse"

  /prices:
    get:
      operationId: getPrices
      tags: [binance]
      summary: Spot prices in USD for the given assets
      parameters:
        - in: query
          name: assets
          required: true
          description: Comma-separated asset symbols, e.g. BTC,ETH,BNB
          schema: { type: string }
      responses:
        "200":
          description: Price map
          content:
            application/json:
              schema:
                type: object
                properties:
                  asOf:
                    type: string
                    format: date-time
                  prices:
                    type: array
                    items:
                      $ref: "#/components/schemas/Price"
                required: [asOf, prices]

  /interest:
    get:
      operationId: listInterest
      tags: [binance]
      summary: Interest charge history
      parameters:
        - in: query
          name: accountId
          required: false
          schema: { type: string }
        - in: query
          name: from
          required: false
          schema: { type: string, format: date-time }
        - in: query
          name: to
          required: false
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Interest charges
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalUsd:
                    type: number
                  weightedApr:
                    type: number
                  projected30dUsd:
                    type: number
                    description: Forward-looking interest over next 30 days at current rates
                  byLoan:
                    type: array
                    items:
                      $ref: "#/components/schemas/InterestByLoan"
                  byAsset:
                    type: array
                    items:
                      $ref: "#/components/schemas/InterestByAsset"
                  rows:
                    type: array
                    items:
                      $ref: "#/components/schemas/InterestRow"
                required: [totalUsd, weightedApr, projected30dUsd, byLoan, byAsset, rows]

  /luno/wallets:
    get:
      operationId: listLunoWallets
      tags: [luno]
      summary: List Luno wallets (balances) across all linked Luno accounts
      responses:
        "200":
          description: Wallets list
          content:
            application/json:
              schema:
                type: object
                properties:
                  wallets:
                    type: array
                    items:
                      $ref: "#/components/schemas/LunoWallet"
                required: [wallets]

  /luno/transactions:
    get:
      operationId: listLunoTransactions
      tags: [luno]
      summary: Recent Luno wallet transactions
      parameters:
        - in: query
          name: asset
          required: false
          description: Filter by asset symbol (e.g. XBT, ZAR)
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: Transactions list (newest first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: "#/components/schemas/LunoTransaction"
                required: [transactions]

  /luno/pending:
    get:
      operationId: listLunoPending
      tags: [luno]
      summary: In-flight Luno withdrawals (PENDING or PROCESSING)
      responses:
        "200":
          description: Pending withdrawals
          content:
            application/json:
              schema:
                type: object
                properties:
                  withdrawals:
                    type: array
                    items:
                      $ref: "#/components/schemas/LunoPendingWithdrawal"
                required: [withdrawals]

  /luno/ticker:
    get:
      operationId: getLunoTicker
      tags: [luno]
      summary: Live ticker for a Luno pair (e.g. XBTZAR)
      parameters:
        - in: query
          name: pair
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Ticker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LunoTicker"

  /luno/tickers:
    get:
      operationId: getLunoTickers
      tags: [luno]
      summary: Batch live tickers for multiple Luno pairs
      description: >
        Quote N pairs in one round-trip. Per-pair failures (unsupported pair,
        upstream hiccup) are silently dropped from the result; clients must
        key by `pair` and tolerate missing entries.
      parameters:
        - in: query
          name: pairs
          required: true
          description: Comma-separated list of pairs, e.g. `XBTZAR,ETHZAR,SOLZAR`. Max 20.
          schema: { type: string }
      responses:
        "200":
          description: Tickers
          content:
            application/json:
              schema:
                type: object
                required: [tickers]
                properties:
                  tickers:
                    type: array
                    items:
                      $ref: "#/components/schemas/LunoTicker"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Account:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        kind:
          type: string
          enum: [Spot, Margin, Funding]
        readOnly: { type: boolean }
        connectedAt: { type: string, format: date-time }
      required: [id, name, kind, readOnly, connectedAt]

    Collateral:
      type: object
      properties:
        asset: { type: string }
        qty: { type: number }
        valueUsd: { type: number }
      required: [asset, qty, valueUsd]

    Loan:
      type: object
      properties:
        id: { type: string }
        accountId: { type: string }
        asset:
          type: string
          description: Borrowed asset symbol (e.g. USDT)
        debt:
          type: number
          description: Outstanding principal + accrued interest in the borrowed asset
        debtUsd: { type: number }
        collateral:
          $ref: "#/components/schemas/Collateral"
        ltv:
          type: number
          description: Current loan-to-value as a percentage (0-100)
        marginCallLtv: { type: number }
        liqLtv: { type: number }
        hourlyInterestRate:
          type: number
          description: Hourly interest rate as a decimal (e.g. 0.0000125)
        apr:
          type: number
          description: Annualised percentage rate derived from hourlyInterestRate (e.g. 10.95)
      required:
        - id
        - accountId
        - asset
        - debt
        - debtUsd
        - collateral
        - ltv
        - marginCallLtv
        - liqLtv
        - hourlyInterestRate
        - apr

    LoansResponse:
      type: object
      properties:
        asOf: { type: string, format: date-time }
        aggregateLtv: { type: number }
        totalDebtUsd: { type: number }
        totalCollateralUsd: { type: number }
        loans:
          type: array
          items:
            $ref: "#/components/schemas/Loan"
      required:
        - asOf
        - aggregateLtv
        - totalDebtUsd
        - totalCollateralUsd
        - loans

    Price:
      type: object
      properties:
        asset: { type: string }
        usd: { type: number }
      required: [asset, usd]

    InterestRow:
      type: object
      properties:
        ts: { type: string, format: date-time }
        accountId: { type: string }
        loanId: { type: string }
        asset: { type: string }
        amount: { type: number }
        amountUsd: { type: number }
      required: [ts, accountId, loanId, asset, amount, amountUsd]

    RatePoint:
      type: object
      properties:
        ts: { type: string, format: date-time }
        apr: { type: number, description: APR % at that timestamp }
      required: [ts, apr]

    InterestByLoan:
      type: object
      properties:
        loanId: { type: string }
        accountId: { type: string }
        asset: { type: string, description: Borrowed asset }
        collateralAsset: { type: string }
        currentApr: { type: number }
        avg30dApr: { type: number }
        min30dApr: { type: number }
        max30dApr: { type: number }
        accrued30dUsd: { type: number }
        projected30dUsd: { type: number }
        dailyUsd: { type: number }
        lifetimeInterestUsd:
          type: number
          description: >-
            Realised interest paid since the loan was opened, in USD. Derived
            from borrow/repay history (flexible) or summed daily interest
            deductions (fixed-term). 0 when unknown.
        loanAgeDays:
          type: integer
          description: Days since the earliest borrow on this loan. 0 when unknown.
        rateHistory:
          type: array
          items:
            $ref: "#/components/schemas/RatePoint"
      required:
        - loanId
        - accountId
        - asset
        - collateralAsset
        - currentApr
        - avg30dApr
        - min30dApr
        - max30dApr
        - accrued30dUsd
        - projected30dUsd
        - dailyUsd
        - lifetimeInterestUsd
        - loanAgeDays
        - rateHistory

    LunoWallet:
      type: object
      properties:
        accountId: { type: string }
        accountName: { type: string }
        walletId: { type: string }
        asset:
          type: string
          description: Asset symbol (Luno uses XBT for Bitcoin)
        balance: { type: number }
        reserved:
          type: number
          description: Funds locked in open orders
        unconfirmed:
          type: number
          description: Incoming deposits not yet confirmed
      required:
        - accountId
        - accountName
        - walletId
        - asset
        - balance
        - reserved
        - unconfirmed

    LunoTransaction:
      type: object
      properties:
        accountId: { type: string }
        accountName: { type: string }
        walletId: { type: string }
        asset: { type: string }
        rowIndex: { type: integer }
        ts: { type: string, format: date-time }
        amount:
          type: number
          description: Signed delta (positive = inflow, negative = outflow)
        balance:
          type: number
          description: Wallet balance after this transaction
        description: { type: string }
      required:
        - accountId
        - accountName
        - walletId
        - asset
        - rowIndex
        - ts
        - amount
        - balance
        - description

    LunoPendingWithdrawal:
      type: object
      properties:
        accountId: { type: string }
        accountName: { type: string }
        withdrawalId: { type: string }
        status: { type: string }
        asset: { type: string }
        amount: { type: number }
        createdAt: { type: string, format: date-time }
      required:
        - accountId
        - accountName
        - withdrawalId
        - status
        - asset
        - amount
        - createdAt

    LunoTicker:
      type: object
      properties:
        pair: { type: string }
        ask: { type: number }
        bid: { type: number }
        lastTrade: { type: number }
        rolling24hVolume: { type: number }
        asOf: { type: string, format: date-time }
      required: [pair, ask, bid, lastTrade, rolling24hVolume, asOf]

    InterestByAsset:
      type: object
      properties:
        asset: { type: string, description: Borrowed asset symbol }
        debtUsd: { type: number }
        weightedApr: { type: number }
        accrued30dUsd: { type: number }
        projected30dUsd: { type: number }
      required: [asset, debtUsd, weightedApr, accrued30dUsd, projected30dUsd]
